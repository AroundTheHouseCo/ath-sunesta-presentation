<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Motorized screen: opening with tracks + mesh half-lowered -->
  <rect x="0" y="0" width="200" height="200" rx="18" fill="#eef6ee"/>
  <!-- housing cassette -->
  <rect x="28" y="26" width="144" height="18" rx="6" fill="#2e7d4f"/>
  <!-- side tracks -->
  <rect x="28" y="44" width="10" height="130" rx="3" fill="#3d3d3d"/>
  <rect x="162" y="44" width="10" height="130" rx="3" fill="#3d3d3d"/>
  <!-- view behind (sky + hill) -->
  <rect x="38" y="44" width="124" height="130" fill="#dceee6"/>
  <circle cx="138" cy="76" r="14" fill="#f5c46a"/>
  <path d="M38 150 Q80 118 122 146 L162 132 L162 174 L38 174 Z" fill="#9cc7ab"/>
  <!-- mesh screen lowered ~60% -->
  <g>
    <rect x="38" y="44" width="124" height="78" fill="#245e3f" opacity="0.88"/>
    <g stroke="#ffffff" stroke-width="1" opacity="0.22">
      <line x1="38" y1="56" x2="162" y2="56"/><line x1="38" y1="70" x2="162" y2="70"/>
      <line x1="38" y1="84" x2="162" y2="84"/><line x1="38" y1="98" x2="162" y2="98"/>
      <line x1="38" y1="112" x2="162" y2="112"/>
      <line x1="52" y1="44" x2="52" y2="122"/><line x1="72" y1="44" x2="72" y2="122"/>
      <line x1="92" y1="44" x2="92" y2="122"/><line x1="112" y1="44" x2="112" y2="122"/>
      <line x1="132" y1="44" x2="132" y2="122"/><line x1="152" y1="44" x2="152" y2="122"/>
    </g>
    <!-- weighted bottom bar -->
    <rect x="34" y="120" width="132" height="10" rx="4" fill="#f5a623"/>
  </g>
</svg>
