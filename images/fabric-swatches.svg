<svg viewBox="0 0 800 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="strGreen" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="#fdfbf4"/>
      <rect width="14" height="28" fill="#2e7d4f"/>
    </pattern>
    <pattern id="strNavy" width="28" height="28" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="#f4f1e8"/>
      <rect width="14" height="28" fill="#27435f"/>
    </pattern>
    <pattern id="strChar" width="36" height="36" patternUnits="userSpaceOnUse">
      <rect width="36" height="36" fill="#efe9dc"/>
      <rect width="10" height="36" fill="#4a4a4a"/>
      <rect x="14" width="4" height="36" fill="#b04a34"/>
    </pattern>
    <pattern id="strTan" width="30" height="30" patternUnits="userSpaceOnUse">
      <rect width="30" height="30" fill="#e8ddc4"/>
      <rect width="8" height="30" fill="#8a6c48"/>
      <rect x="12" width="3" height="30" fill="#8a6c48"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="800" height="620" fill="#f7f7f5"/>

  <!-- fabric swatch grid: 4 x 3, each with folded corner -->
  <g>
    <!-- row 1 -->
    <rect x="46"  y="40" width="160" height="120" rx="10" fill="url(#strGreen)"/>
    <rect x="226" y="40" width="160" height="120" rx="10" fill="#6b7d5d"/>
    <rect x="406" y="40" width="160" height="120" rx="10" fill="url(#strNavy)"/>
    <rect x="586" y="40" width="160" height="120" rx="10" fill="#b6a27c"/>
    <!-- row 2 -->
    <rect x="46"  y="180" width="160" height="120" rx="10" fill="#5b3a3a"/>
    <rect x="226" y="180" width="160" height="120" rx="10" fill="url(#strChar)"/>
    <rect x="406" y="180" width="160" height="120" rx="10" fill="#3f4c40"/>
    <rect x="586" y="180" width="160" height="120" rx="10" fill="url(#strTan)"/>
    <!-- row 3 -->
    <rect x="46"  y="320" width="160" height="120" rx="10" fill="#27435f"/>
    <rect x="226" y="320" width="160" height="120" rx="10" fill="#e5dcc6"/>
    <rect x="406" y="320" width="160" height="120" rx="10" fill="#8a4a32"/>
    <rect x="586" y="320" width="160" height="120" rx="10" fill="#4a4a4a"/>
  </g>
  <!-- subtle outlines -->
  <g fill="none" stroke="#00000022" stroke-width="1.5">
    <rect x="46"  y="40" width="160" height="120" rx="10"/><rect x="226" y="40" width="160" height="120" rx="10"/>
    <rect x="406" y="40" width="160" height="120" rx="10"/><rect x="586" y="40" width="160" height="120" rx="10"/>
    <rect x="46"  y="180" width="160" height="120" rx="10"/><rect x="226" y="180" width="160" height="120" rx="10"/>
    <rect x="406" y="180" width="160" height="120" rx="10"/><rect x="586" y="180" width="160" height="120" rx="10"/>
    <rect x="46"  y="320" width="160" height="120" rx="10"/><rect x="226" y="320" width="160" height="120" rx="10"/>
    <rect x="406" y="320" width="160" height="120" rx="10"/><rect x="586" y="320" width="160" height="120" rx="10"/>
  </g>

  <!-- caption -->
  <text x="46" y="478" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="16" font-weight="700" fill="#3d3d3d">A sample of 100+ solution-dyed fabrics — the swatch book has the full range</text>

  <!-- frame colors row -->
  <text x="46" y="524" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="13" font-weight="800" letter-spacing="1.5" fill="#2e7d4f">FRAME COLORS</text>
  <g>
    <rect x="46"  y="538" width="120" height="44" rx="8" fill="#ffffff" stroke="#cccccc"/>
    <rect x="186" y="538" width="120" height="44" rx="8" fill="#e8dcc0" stroke="#c9bd9f"/>
    <rect x="326" y="538" width="120" height="44" rx="8" fill="#b9a88a" stroke="#a2916f"/>
    <rect x="466" y="538" width="120" height="44" rx="8" fill="#2b2b2b"/>
    <rect x="606" y="538" width="120" height="44" rx="8" fill="#4a3527"/>
  </g>
  <g font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="12" font-weight="700">
    <text x="82"  y="565" fill="#555">White</text>
    <text x="222" y="565" fill="#6b5d3a">Beige</text>
    <text x="368" y="565" fill="#4d4128">Clay</text>
    <text x="504" y="565" fill="#ffffff">Black</text>
    <text x="640" y="565" fill="#ffffff">Brown</text>
  </g>
</svg>
