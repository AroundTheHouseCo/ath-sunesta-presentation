<svg viewBox="0 0 360 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="rsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dfeaf2"/>
      <stop offset="1" stop-color="#eef3f6"/>
    </linearGradient>
  </defs>
  <rect width="360" height="200" rx="10" fill="url(#rsky)"/>
  <!-- storm cloud -->
  <g>
    <ellipse cx="150" cy="46" rx="70" ry="26" fill="#8a97a3"/>
    <ellipse cx="110" cy="52" rx="40" ry="22" fill="#9aa6b1"/>
    <ellipse cx="200" cy="52" rx="46" ry="24" fill="#7d8b98"/>
  </g>
  <!-- rain -->
  <g stroke="#5b9bd5" stroke-width="4" stroke-linecap="round">
    <line x1="96" y1="74" x2="88" y2="94"/>
    <line x1="124" y1="76" x2="116" y2="96"/>
    <line x1="152" y1="74" x2="144" y2="94"/>
    <line x1="180" y1="76" x2="172" y2="96"/>
    <line x1="208" y1="74" x2="200" y2="94"/>
  </g>
  <!-- awning deflecting rain: striped canopy angled -->
  <g>
    <polygon points="60,150 300,110 300,124 60,168" fill="#2e7d4f"/>
    <g fill="#ffffff" opacity="0.28">
      <polygon points="60,150 60,168 96,162 96,144"/>
      <polygon points="132,138 132,156 168,150 168,132"/>
      <polygon points="204,126 204,144 240,138 240,120"/>
      <polygon points="276,114 276,132 300,127 300,110"/>
    </g>
    <!-- scalloped front edge -->
    <g fill="#f5a623">
      <path d="M60 168 q6 10 14 6 z"/>
      <path d="M96 162 q6 10 14 6 z"/>
      <path d="M132 156 q6 10 14 6 z"/>
      <path d="M168 150 q6 10 14 6 z"/>
      <path d="M204 144 q6 10 14 6 z"/>
      <path d="M240 138 q6 10 14 6 z"/>
      <path d="M276 132 q6 10 14 6 z"/>
    </g>
  </g>
  <!-- deflected drops sliding off the front -->
  <g stroke="#5b9bd5" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="70" y1="176" x2="66" y2="188"/>
    <line x1="86" y1="172" x2="82" y2="184"/>
  </g>
  <text x="300" y="176" text-anchor="end" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="14" font-weight="800" fill="#2e7d4f">Enjoy it in the rain</text>
</svg>
