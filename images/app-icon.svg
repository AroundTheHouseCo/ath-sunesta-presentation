<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- THE DOGHOUSE — app icon. Pure symbol, no baked-in wordmark: iOS/Android
       render the app name themselves under the icon, and text this small
       goes illegible at 120px anyway. Full-bleed, no rounded corners —
       iOS/Android apply their own mask. Glyph stays within the inner ~80%
       safe zone so a circle mask (Android) doesn't clip it. -->
  <defs>
    <linearGradient id="ic-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7B84A"/>
      <stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#ic-bg)"/>

  <!-- Doghouse silhouette: peaked roof + body, doubling as the "A" of
       Around The House. Charcoal on the orange field — same pairing as the
       in-app orange topbar badge, for immediate brand recognition. -->
  <g fill="#3D3D3D">
    <!-- roof: wide overhang for a friendly, sturdy silhouette -->
    <polygon points="256,108 432,268 400,268 256,150 112,268 80,268"/>
    <!-- body -->
    <rect x="140" y="266" width="232" height="150" rx="4"/>
  </g>
  <!-- subtle eave shadow, underside of the roof overhang, for a touch of depth -->
  <polygon points="256,150 400,268 112,268" fill="#2E2E2E" opacity="0.35"/>

  <!-- Archway door — cut through in the background color so it reads as a
       real opening, not a solid block. Classic doghouse arch, not a square
       door: ties the mark to "DOGHOUSE" specifically, not just "house". -->
  <path d="M 222 416 L 222 350 A 34 34 0 0 1 290 350 L 290 416 Z" fill="url(#ic-bg)"/>

  <!-- Roof ridge accent — thin highlight line for a touch of dimension,
       kept subtle so it holds up at 120px. -->
  <line x1="256" y1="150" x2="256" y2="170" stroke="#F5A623" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
</svg>
