<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Step 6: 12-month Shade Service (cleaning visit) -->
  <rect width="200" height="200" rx="18" fill="#eef6ee"/>
  <!-- screen/mesh swatch being serviced -->
  <rect x="46" y="46" width="70" height="92" rx="6" fill="#ffffff" stroke="#2e7d4f" stroke-width="5"/>
  <g stroke="#cfe6d6" stroke-width="3">
    <line x1="46" y1="64" x2="116" y2="64"/>
    <line x1="46" y1="82" x2="116" y2="82"/>
    <line x1="46" y1="100" x2="116" y2="100"/>
    <line x1="46" y1="118" x2="116" y2="118"/>
    <line x1="64" y1="46" x2="64" y2="138"/>
    <line x1="81" y1="46" x2="81" y2="138"/>
    <line x1="98" y1="46" x2="98" y2="138"/>
  </g>
  <!-- spray bottle -->
  <g transform="translate(118,90) rotate(-14)">
    <rect x="0" y="18" width="30" height="46" rx="6" fill="#2e7d4f"/>
    <rect x="8" y="4" width="10" height="16" rx="3" fill="#1b5e3f"/>
