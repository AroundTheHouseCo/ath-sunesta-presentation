    <rect x="0" y="0" width="52" height="14" rx="7" fill="#d98e12"/>
    <text x="26" y="32" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="20" font-weight="900" fill="#ffffff">12</text>
  </g>
