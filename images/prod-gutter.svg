<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gutter Helmet: roofline + gutter with helmet nose -->
  <rect x="0" y="0" width="200" height="200" rx="18" fill="#eef6ee"/>
  <!-- roof -->
  <polygon points="30,86 118,30 186,74 178,86 118,48 42,96" fill="#2e7d4f"/>
  <!-- shingle lines -->
  <line x1="66" y1="76" x2="130" y2="34" stroke="#245e3f" stroke-width="3"/>
  <line x1="86" y1="88" x2="152" y2="46" stroke="#245e3f" stroke-width="3"/>
  <!-- helmet curve over gutter -->
  <path d="M36 96 Q34 116 52 120 L52 112 Q44 110 44 100 Z" fill="#f5a623"/>
  <path d="M42 96 L118 48 L118 60 L48 104 Z" fill="#f5a623"/>
  <!-- gutter body -->
  <path d="M40 118 q0 18 20 18 l8 0 l0 -12 l-8 0 q-8 0 -8 -8 l0 -6 l-12 0 z" fill="#3d3d3d"/>
  <!-- water drop passing over nose -->
  <circle cx="34" cy="128" r="5" fill="#7fb7d9"/>
  <circle cx="30" cy="146" r="4" fill="#7fb7d9"/>
  <!-- fascia/wall -->
  <rect x="72" y="122" width="16" height="60" fill="#d8e6db"/>
  <rect x="88" y="108" width="76" height="74" fill="#e7efe8"/>
  <line x1="88" y1="126" x2="164" y2="126" stroke="#cfe0d3" stroke-width="3"/>
  <line x1="88" y1="146" x2="164" y2="146" stroke="#cfe0d3" stroke-width="3"/>
  <line x1="88" y1="166" x2="164" y2="166" stroke="#cfe0d3" stroke-width="3"/>
</svg>
