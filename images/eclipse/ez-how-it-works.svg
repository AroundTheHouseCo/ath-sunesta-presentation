<svg viewBox="0 0 800 640" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif">
  <!-- E-Zip zipper-track screen — native diagram (Reference Guide p.7 geometry).
       1 cassette · 2 zipper-locked track · 3 hem bar w/ brush seal · 4 one-button control -->
  <defs>
    <pattern id="ezmesh" width="9" height="9" patternUnits="userSpaceOnUse">
      <rect width="9" height="9" fill="#3f7a58" opacity="0.16"/>
      <path d="M0 4.5 H9 M4.5 0 V9" stroke="#1b5e3f" stroke-width="0.9" opacity="0.35"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="800" height="640" rx="18" fill="#eef6ee"/>

  <!-- travel arrow -->
  <g stroke="#F5A623" stroke-width="7" stroke-linecap="round" fill="#F5A623">
    <line x1="400" y1="205" x2="400" y2="415"/>
    <path d="M400 168 L378 202 H422 Z"/>
    <path d="M400 452 L378 418 H422 Z"/>
  </g>

  <!-- side tracks -->
  <rect x="96"  y="128" width="30" height="382" rx="6" fill="#2e7d4f"/>
  <rect x="674" y="128" width="30" height="382" rx="6" fill="#2e7d4f"/>

  <!-- fabric -->
  <rect x="126" y="132" width="548" height="342" fill="url(#ezmesh)"/>

  <!-- cassette box with open-face cutaway showing the roller -->
  <rect x="82" y="52" width="636" height="80" rx="14" fill="#1b5e3f"/>
  <rect x="82" y="118" width="636" height="10" fill="#164d33"/>
  <circle cx="150" cy="92" r="27" fill="#eef6ee"/>
  <circle cx="150" cy="92" r="18" fill="#2e7d4f"/>
  <circle cx="150" cy="92" r="6"  fill="#eef6ee"/>

  <!-- hem bar + brush seal -->
  <rect x="106" y="472" width="588" height="30" rx="8" fill="#1b5e3f"/>
  <g stroke="#8a6d3b" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <line x1="130" y1="502" x2="130" y2="522"/><line x1="160" y1="502" x2="160" y2="522"/>
    <line x1="190" y1="502" x2="190" y2="522"/><line x1="220" y1="502" x2="220" y2="522"/>
    <line x1="250" y1="502" x2="250" y2="522"/><line x1="280" y1="502" x2="280" y2="522"/>
    <line x1="310" y1="502" x2="310" y2="522"/><line x1="340" y1="502" x2="340" y2="522"/>
    <line x1="370" y1="502" x2="370" y2="522"/><line x1="400" y1="502" x2="400" y2="522"/>
    <line x1="430" y1="502" x2="430" y2="522"/><line x1="460" y1="502" x2="460" y2="522"/>
    <line x1="490" y1="502" x2="490" y2="522"/><line x1="520" y1="502" x2="520" y2="522"/>
    <line x1="550" y1="502" x2="550" y2="522"/><line x1="580" y1="502" x2="580" y2="522"/>
    <line x1="610" y1="502" x2="610" y2="522"/><line x1="640" y1="502" x2="640" y2="522"/>
    <line x1="670" y1="502" x2="670" y2="522"/>
  </g>
  <line x1="100" y1="530" x2="700" y2="530" stroke="#c9b891" stroke-width="4" stroke-linecap="round"/>

  <!-- zipper-track magnifier inset -->
  <circle cx="600" cy="300" r="86" fill="#ffffff" stroke="#F5A623" stroke-width="6"/>
  <line x1="668" y1="248" x2="689" y2="222" stroke="#F5A623" stroke-width="6" stroke-linecap="round"/>
  <g transform="translate(600 300)">
    <!-- track C-channel cross-section -->
    <path d="M38 -52 H10 V52 H38" fill="none" stroke="#2e7d4f" stroke-width="12" stroke-linejoin="round"/>
    <!-- PVC insert -->
    <path d="M30 -38 H18 V38 H30" fill="none" stroke="#1b5e3f" stroke-width="7"/>
    <!-- fabric coming in -->
    <line x1="-62" y1="0" x2="14" y2="0" stroke="#3f7a58" stroke-width="6"/>
    <!-- zipper weld beads on the fabric edge, locked inside the channel -->
    <circle cx="20" cy="-12" r="5.5" fill="#F5A623"/>
    <circle cx="20" cy="0"   r="5.5" fill="#F5A623"/>
    <circle cx="20" cy="12"  r="5.5" fill="#F5A623"/>
  </g>

  <!-- remote -->
  <rect x="60" y="546" width="52" height="82" rx="12" fill="#ffffff" stroke="#1b5e3f" stroke-width="4"/>
  <circle cx="86" cy="576" r="9" fill="#F5A623"/>
  <rect x="78" y="596" width="16" height="8" rx="3" fill="#2e7d4f"/>

  <!-- numbered chips -->
  <g font-weight="700" font-size="26" text-anchor="middle">
    <circle cx="726" cy="92"  r="20" fill="#F5A623"/><text x="726" y="101" fill="#fff">1</text>
    <circle cx="600" cy="300" r="20" fill="#F5A623" transform="translate(-124 -62)"/><text x="476" y="247" fill="#fff">2</text>
    <circle cx="726" cy="487" r="20" fill="#F5A623"/><text x="726" y="496" fill="#fff">3</text>
    <circle cx="136" cy="576" r="20" fill="#F5A623"/><text x="136" y="585" fill="#fff">4</text>
  </g>
</svg>
