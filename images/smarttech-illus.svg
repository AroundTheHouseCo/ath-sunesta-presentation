<svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="stg" cx="0.42" cy="0.4" r="0.75">
      <stop offset="0" stop-color="#2a6a47"/>
      <stop offset="1" stop-color="#123626"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="800" height="560" fill="url(#stg)"/>

  <!-- faint diagonal brand lines -->
  <g stroke="#2e7d4f" opacity="0.16">
    <line x1="-60" y1="0" x2="240" y2="560" stroke-width="2"/>
    <line x1="80" y1="0" x2="380" y2="560" stroke-width="4"/>
    <line x1="220" y1="0" x2="520" y2="560" stroke-width="2"/>
    <line x1="360" y1="0" x2="660" y2="560" stroke-width="4"/>
  </g>

  <!-- handheld remote -->
  <g transform="translate(150,150)">
    <rect x="0" y="0" width="96" height="240" rx="26" fill="#f4f4f2"/>
    <rect x="0" y="0" width="96" height="240" rx="26" fill="none" stroke="#cfd8cf" stroke-width="2"/>
    <circle cx="48" cy="62" r="20" fill="#2e7d4f"/>
    <path d="M48 52 l0 14 m-6 -7 l6 -7 l6 7" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <rect x="30" y="102" width="36" height="12" rx="6" fill="#c9d4c9"/>
    <circle cx="48" cy="150" r="20" fill="#3d3d3d"/>
    <path d="M48 160 l0 -14 m-6 7 l6 7 l6 -7" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="48" cy="200" r="11" fill="#f5a623"/>
  </g>

  <!-- phone with app -->
  <g transform="translate(330,120)">
    <rect x="0" y="0" width="150" height="300" rx="24" fill="#16281f"/>
    <rect x="8" y="14" width="134" height="272" rx="16" fill="#ffffff"/>
    <rect x="58" y="20" width="34" height="6" rx="3" fill="#16281f"/>
    <text x="24" y="66" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="17" font-weight="700" fill="#1b5e3f">Sunesta</text>
    <rect x="24" y="84" width="102" height="58" rx="10" fill="#eef6ee"/>
    <polygon points="112,98 40,112 40,120 112,106" fill="#2e7d4f"/>
    <rect x="24" y="158" width="102" height="34" rx="17" fill="#2e7d4f"/>
    <text x="46" y="180" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Extend</text>
    <circle cx="38" cy="222" r="7" fill="#f5a623"/>
    <line x1="52" y1="222" x2="118" y2="222" stroke="#e2e8e2" stroke-width="6" stroke-linecap="round"/>
    <line x1="52" y1="222" x2="96" y2="222" stroke="#f5a623" stroke-width="6" stroke-linecap="round"/>
    <rect x="24" y="244" width="102" height="26" rx="8" fill="#f3f7f3"/>
  </g>

  <!-- wifi arcs linking remote/phone to sensor node -->
  <g stroke="#8fd0aa" fill="none" stroke-linecap="round">
    <path d="M540 180 a56 56 0 0 1 56 -56" stroke-width="6" opacity="0.9"/>
    <path d="M540 214 a90 90 0 0 1 90 -90" stroke-width="6" opacity="0.55"/>
    <path d="M540 248 a124 124 0 0 1 124 -124" stroke-width="6" opacity="0.3"/>
  </g>
  <circle cx="545" cy="185" r="9" fill="#f5a623"/>

  <!-- small wall switch -->
  <g transform="translate(560,300)">
    <rect x="0" y="0" width="70" height="110" rx="12" fill="#f4f4f2"/>
    <rect x="18" y="18" width="34" height="30" rx="6" fill="#2e7d4f"/>
    <rect x="18" y="62" width="34" height="30" rx="6" fill="#d8e0d8"/>
  </g>
</svg>
