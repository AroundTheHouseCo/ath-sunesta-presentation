<svg viewBox="0 0 600 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sensbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2e7d4f"/>
      <stop offset="1" stop-color="#1b5e3f"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="600" height="560" fill="url(#sensbg)"/>

  <!-- faint diagonal lines, echoing the brand background -->
  <g stroke="#ffffff" opacity="0.06">
    <line x1="40" y1="0" x2="260" y2="560" stroke-width="3"/>
    <line x1="180" y1="0" x2="400" y2="560" stroke-width="6"/>
    <line x1="320" y1="0" x2="540" y2="560" stroke-width="3"/>
    <line x1="460" y1="0" x2="680" y2="560" stroke-width="6"/>
  </g>

  <!-- WIND circle @ (300,100) -->
  <g>
    <circle cx="300" cy="100" r="76" fill="#ffffff"/>
    <circle cx="300" cy="100" r="76" fill="none" stroke="#e8f2ea" stroke-width="6"/>
    <g stroke="#2e7d4f" stroke-width="7" fill="none" stroke-linecap="round">
      <path d="M258 86 h52 a14 14 0 1 0 -14 -18"/>
      <path d="M252 108 h74 a14 14 0 1 1 -14 18"/>
      <path d="M262 130 h30"/>
    </g>
  </g>

  <!-- RAIN circle @ (300,280) -->
  <g>
    <circle cx="300" cy="280" r="76" fill="#ffffff"/>
    <circle cx="300" cy="280" r="76" fill="none" stroke="#e8f2ea" stroke-width="6"/>
    <path d="M266 278 a18 18 0 0 1 6 -35 a24 24 0 0 1 46 -6 a17 17 0 0 1 14 41 z" fill="#2e7d4f"/>
    <g stroke="#7fb7d9" stroke-width="7" stroke-linecap="round">
      <line x1="276" y1="296" x2="268" y2="316"/>
      <line x1="302" y1="298" x2="294" y2="318"/>
      <line x1="328" y1="296" x2="320" y2="316"/>
    </g>
  </g>

  <!-- SUN circle @ (300,460) -->
  <g>
    <circle cx="300" cy="460" r="76" fill="#ffffff"/>
    <circle cx="300" cy="460" r="76" fill="none" stroke="#e8f2ea" stroke-width="6"/>
    <circle cx="300" cy="460" r="26" fill="#f5a623"/>
    <g stroke="#f5a623" stroke-width="7" stroke-linecap="round">
      <line x1="300" y1="414" x2="300" y2="424"/>
      <line x1="300" y1="496" x2="300" y2="506"/>
      <line x1="254" y1="460" x2="264" y2="460"/>
      <line x1="336" y1="460" x2="346" y2="460"/>
      <line x1="268" y1="428" x2="275" y2="435"/>
      <line x1="325" y1="485" x2="332" y2="492"/>
      <line x1="332" y1="428" x2="325" y2="435"/>
      <line x1="275" y1="485" x2="268" y2="492"/>
    </g>
  </g>

  <!-- connective dotted line -->
  <line x1="300" y1="176" x2="300" y2="204" stroke="#ffffff" stroke-width="4" stroke-dasharray="2,8" stroke-linecap="round" opacity="0.5"/>
  <line x1="300" y1="356" x2="300" y2="384" stroke="#ffffff" stroke-width="4" stroke-dasharray="2,8" stroke-linecap="round" opacity="0.5"/>
</svg>
