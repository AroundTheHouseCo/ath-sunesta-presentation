<svg viewBox="0 0 360 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="360" height="200" rx="10" fill="#eaf1f4"/>
  <!-- sun + UV rays hitting the left side -->
  <g>
    <circle cx="70" cy="46" r="22" fill="#f5a623"/>
    <g stroke="#f2b23a" stroke-width="5" stroke-linecap="round" opacity="0.9">
      <line x1="86" y1="62" x2="120" y2="96"/>
      <line x1="70" y1="70" x2="82" y2="104"/>
      <line x1="54" y1="66" x2="44" y2="100"/>
    </g>
    <text x="70" y="52" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="15" font-weight="900" fill="#ffffff">UV</text>
  </g>
  <!-- wood floor planks: faded (left, sun-hit) vs rich (right, protected) -->
  <g>
    <!-- faded/bleached side -->
    <rect x="0" y="120" width="180" height="80" fill="#cbb79a"/>
    <g stroke="#b8a488" stroke-width="2">
      <line x1="0" y1="140" x2="180" y2="140"/>
      <line x1="0" y1="160" x2="180" y2="160"/>
      <line x1="0" y1="180" x2="180" y2="180"/>
      <line x1="60" y1="120" x2="60" y2="200"/>
      <line x1="120" y1="120" x2="120" y2="200"/>
    </g>
    <!-- rich/protected side -->
    <rect x="180" y="120" width="180" height="80" fill="#8a5a34"/>
    <g stroke="#6f4526" stroke-width="2">
      <line x1="180" y1="140" x2="360" y2="140"/>
      <line x1="180" y1="160" x2="360" y2="160"/>
      <line x1="180" y1="180" x2="360" y2="180"/>
      <line x1="240" y1="120" x2="240" y2="200"/>
      <line x1="300" y1="120" x2="300" y2="200"/>
    </g>
    <!-- divider line -->
    <line x1="180" y1="120" x2="180" y2="200" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  </g>
  <!-- labels -->
  <text x="90" y="112" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="13" font-weight="800" fill="#a8863f">FADED BY THE SUN</text>
  <text x="270" y="112" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="13" font-weight="800" fill="#2e7d4f">SHADED &amp; PROTECTED</text>
</svg>
