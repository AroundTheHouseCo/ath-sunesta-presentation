<svg viewBox="0 0 800 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1f18"/>
      <stop offset="1" stop-color="#12352a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd68a" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffd68a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pool" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f2b45a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f2b45a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a2c22"/>
      <stop offset="1" stop-color="#0e1c16"/>
    </linearGradient>
  </defs>

  <!-- night sky -->
  <rect x="0" y="0" width="800" height="560" fill="url(#sky)"/>
  <circle cx="120" cy="70" r="1.6" fill="#dfeee6" opacity="0.7"/>
  <circle cx="260" cy="46" r="1.2" fill="#dfeee6" opacity="0.5"/>
  <circle cx="400" cy="90" r="1.4" fill="#dfeee6" opacity="0.6"/>
  <circle cx="70" cy="150" r="1.1" fill="#dfeee6" opacity="0.4"/>
  <circle cx="330" cy="130" r="1" fill="#dfeee6" opacity="0.4"/>

  <!-- house wall on the right -->
  <rect x="560" y="0" width="240" height="560" fill="url(#wall)"/>
  <rect x="600" y="120" width="120" height="150" rx="4" fill="#0c1712" opacity="0.7"/>

  <!-- warm light pool on the deck -->
  <ellipse cx="330" cy="470" rx="330" ry="90" fill="url(#pool)"/>

  <!-- deck -->
  <rect x="0" y="452" width="800" height="108" fill="#12241b"/>
  <line x1="0" y1="452" x2="800" y2="452" stroke="#26473650" stroke-width="2"/>

  <!-- extended awning: trapezoid projecting left from the wall -->
  <polygon points="560,150 150,196 150,236 560,196" fill="#173a2a"/>
  <polygon points="560,150 150,196 560,196" fill="#1f5138" opacity="0.85"/>
  <!-- subtle stripes -->
  <g opacity="0.25">
    <line x1="230" y1="188" x2="230" y2="228" stroke="#2e7d4f" stroke-width="10"/>
    <line x1="310" y1="180" x2="310" y2="220" stroke="#2e7d4f" stroke-width="10"/>
    <line x1="390" y1="172" x2="390" y2="212" stroke="#2e7d4f" stroke-width="10"/>
    <line x1="470" y1="164" x2="470" y2="204" stroke="#2e7d4f" stroke-width="10"/>
  </g>
  <!-- front bar -->
  <polygon points="150,196 560,196 560,206 150,236" fill="#0e2419"/>

  <!-- LED dots glowing under the front bar -->
  <g>
    <circle cx="200" cy="226" r="26" fill="url(#glow)"/>
    <circle cx="290" cy="216" r="26" fill="url(#glow)"/>
    <circle cx="380" cy="207" r="26" fill="url(#glow)"/>
    <circle cx="470" cy="197" r="26" fill="url(#glow)"/>
    <circle cx="540" cy="190" r="26" fill="url(#glow)"/>
    <circle cx="200" cy="226" r="3.4" fill="#fff2d6"/>
    <circle cx="290" cy="216" r="3.4" fill="#fff2d6"/>
    <circle cx="380" cy="207" r="3.4" fill="#fff2d6"/>
    <circle cx="470" cy="197" r="3.4" fill="#fff2d6"/>
    <circle cx="540" cy="190" r="3.4" fill="#fff2d6"/>
  </g>

  <!-- simple chair silhouettes -->
  <g fill="#0b1611" opacity="0.9">
    <path d="M250 452 l0 -46 l10 0 l0 46 z M250 406 q20 -8 40 0 l0 10 q-20 -8 -40 0 z M290 406 l0 46 l-10 0 l0 -46 z"/>
    <path d="M360 452 l0 -46 l10 0 l0 46 z M360 406 q20 -8 40 0 l0 10 q-20 -8 -40 0 z M400 406 l0 46 l-10 0 l0 -46 z"/>
  </g>

  <!-- Illustration placeholder — swap this file for a real lit-awning night photo when available -->
</svg>
