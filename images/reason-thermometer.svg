<svg viewBox="0 0 360 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="360" height="200" rx="10" fill="#f7f7f5"/>
  <!-- ===== top zone: sun · thermometer · arrow+20 ===== -->
  <!-- sun -->
  <g>
    <circle cx="58" cy="66" r="18" fill="#f5a623"/>
    <g stroke="#f5a623" stroke-width="4" stroke-linecap="round">
      <line x1="58" y1="36" x2="58" y2="44"/>
      <line x1="58" y1="88" x2="58" y2="96"/>
      <line x1="28" y1="66" x2="36" y2="66"/>
      <line x1="80" y1="66" x2="88" y2="66"/>
      <line x1="37" y1="45" x2="43" y2="51"/>
      <line x1="73" y1="81" x2="79" y2="87"/>
      <line x1="79" y1="45" x2="73" y2="51"/>
      <line x1="43" y1="81" x2="37" y2="87"/>
    </g>
  </g>
  <!-- thermometer (compact) -->
  <g transform="translate(150,24)">
    <rect x="-9" y="0" width="18" height="68" rx="9" fill="#ffffff" stroke="#cfcabb" stroke-width="3"/>
    <rect x="-5" y="34" width="10" height="46" fill="#e05c4a"/>
    <circle cx="0" cy="84" r="15" fill="#e05c4a"/>
    <circle cx="0" cy="84" r="8" fill="#b83f30"/>
    <g stroke="#b7b1a1" stroke-width="2" stroke-linecap="round">
      <line x1="11" y1="14" x2="17" y2="14"/>
      <line x1="11" y1="30" x2="17" y2="30"/>
      <line x1="11" y1="46" x2="17" y2="46"/>
    </g>
  </g>
  <!-- cooling arrow + 20 -->
  <g transform="translate(222,46)">
    <path d="M6 2 l0 34 m-13 -12 l13 14 l13 -14" stroke="#2e7d4f" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="250" y="86" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="46" font-weight="900" fill="#1b5e3f">20°</text>
  <!-- ===== bottom zone: text ===== -->
  <text x="180" y="152" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="17" font-weight="800" letter-spacing="1" fill="#3d3d3d">COOLER UNDER THE AWNING</text>
  <text x="180" y="176" text-anchor="middle" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="13" font-weight="600" fill="#777">a 90° day feels like a cool 70°</text>
</svg>
