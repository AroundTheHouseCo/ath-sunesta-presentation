<svg viewBox="0 0 420 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f2f6f2"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2e7d4f"/>
      <stop offset="1" stop-color="#1b5e3f"/>
    </linearGradient>
  </defs>

  <!-- phone body -->
  <rect x="60" y="30" width="300" height="560" rx="40" fill="#16281f"/>
  <rect x="60" y="30" width="300" height="560" rx="40" fill="none" stroke="#0d1a13" stroke-width="2"/>
  <!-- screen -->
  <rect x="76" y="58" width="268" height="504" rx="22" fill="url(#screen)"/>
  <!-- notch -->
  <rect x="180" y="66" width="60" height="10" rx="5" fill="#16281f"/>

  <!-- header -->
  <text x="100" y="118" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="22" font-weight="700" fill="#1b5e3f">Sunesta</text>
  <!-- wifi glyph -->
  <g transform="translate(300,100)" stroke="#2e7d4f" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M-14 0 a20 20 0 0 1 28 0"/>
    <path d="M-8 8 a12 12 0 0 1 16 0"/>
    <circle cx="0" cy="15" r="2" fill="#2e7d4f" stroke="none"/>
  </g>
  <line x1="100" y1="132" x2="320" y2="132" stroke="#e2e8e2" stroke-width="2"/>

  <!-- awning tile illustration -->
  <rect x="100" y="150" width="220" height="120" rx="12" fill="#eef6ee"/>
  <rect x="250" y="168" width="54" height="84" rx="3" fill="#d8e6db"/>
  <polygon points="250,182 120,206 120,222 250,206" fill="#2e7d4f"/>
  <polygon points="250,182 120,206 250,206" fill="#1b5e3f" opacity="0.6"/>
  <line x1="120" y1="206" x2="250" y2="206" stroke="#0e2419" stroke-width="3"/>

  <!-- open / close pill -->
  <rect x="100" y="292" width="220" height="52" rx="26" fill="url(#btn)"/>
  <g transform="translate(132,318)" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M-8 4 l8 -8 l8 8"/>
  </g>
  <text x="164" y="324" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="17" font-weight="700" fill="#ffffff">Extend Awning</text>

  <!-- brightness slider -->
  <text x="100" y="384" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="13" font-weight="600" fill="#6a746c">LED BRIGHTNESS</text>
  <g transform="translate(104,404)">
    <circle cx="6" cy="6" r="7" fill="#f5a623"/>
    <line x1="20" y1="6" x2="206" y2="6" stroke="#e2e8e2" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="6" x2="150" y2="6" stroke="#f5a623" stroke-width="6" stroke-linecap="round"/>
    <circle cx="150" cy="6" r="11" fill="#fff" stroke="#f5a623" stroke-width="3"/>
  </g>

  <!-- schedule row -->
  <rect x="100" y="436" width="220" height="46" rx="12" fill="#f3f7f3"/>
  <g transform="translate(122,459)" stroke="#2e7d4f" stroke-width="2.4" fill="none">
    <circle cx="0" cy="0" r="10"/>
    <path d="M0 -5 L0 0 L5 3" stroke-linecap="round"/>
  </g>
  <text x="144" y="464" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="15" font-weight="600" fill="#3d3d3d">Schedule &amp; scenes</text>

  <!-- works with -->
  <text x="100" y="512" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="13" fill="#8a938c">Works with Alexa &amp; Google</text>

  <!-- label -->
  <text x="76" y="588" font-family="-apple-system,Segoe UI,Roboto,Arial,sans-serif" font-size="11" fill="#b7c1b9">myLink app — illustration placeholder</text>
</svg>
