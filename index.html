<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>THE DOGHOUSE — ATHHS Sales & Training</title>

<!-- Add to Home Screen (iOS fullscreen standalone) + PWA manifest.
     Paths are relative so they resolve under whatever GitHub Pages subpath the repo name gives us. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DOGHOUSE">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1b5e3f">

<!-- apple-touch-icon: iOS ignores the manifest's icons[] entirely for the
     home-screen icon — these <link> tags are the only thing that matters.
     Listed largest-first; iOS picks the closest match for the device. -->
<link rel="apple-touch-icon" sizes="180x180" href="images/icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="images/icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="images/icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="images/icon-120.png">
<link rel="icon" type="image/svg+xml" href="images/app-icon.svg">
<link rel="manifest" href="manifest.webmanifest">

<!-- apple-touch-startup-image: the iOS splash shown the instant the icon is
     tapped, before any CSS/JS loads. Without an exact device-width/height/DPR
     match, iOS shows a blank white screen instead — these four cover the
     11" and 12.9" iPad Pro (portrait + landscape), the only iPads in scope.
     Values are in CSS points, not pixels — Apple's standard figures for
     these two screen classes, unchanged across generations since 2018. -->
<link rel="apple-touch-startup-image" href="images/splash-1668x2388.jpg"
      media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
<link rel="apple-touch-startup-image" href="images/splash-2388x1668.jpg"
      media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)">
<link rel="apple-touch-startup-image" href="images/splash-2048x2732.jpg"
      media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)">
<link rel="apple-touch-startup-image" href="images/splash-2732x2048.jpg"
      media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)">

<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="brand">
      <div class="brand-badge">S</div>
      <div class="brand-text" id="brandText">Around The House · <b>THE DOGHOUSE</b></div>
    </div>
    <div class="topbar-nav" id="topbarNav"></div>
  </div>

  <div class="home-screen" id="homeScreen"></div>
  <div class="training-center" id="trainingCenter" style="display:none;"></div>

  <div class="stage" id="stage">
    <div class="slide-area" id="slideArea"></div>
    <div class="rehearsal-panel" id="rehearsalPanel" style="display:none;"></div>
  </div>

  <div class="slidebar">
    <button class="nav" id="prevBtn">‹</button>
    <div class="dots" id="dots"></div>
    <button class="nav" id="nextBtn">›</button>
    <div class="count" id="count"></div>
  </div>

  <div class="tabbar" id="tabbar"></div>

  <div class="note">Placeholder images from the screen recording — swap files in /images for real exports when ready. Content and slide order are fully editable in js/data-&lt;product&gt;.js.</div>
</div>

<script src="js/images-map.js"></script>
<script src="js/library-data.js"></script>
<script src="js/registry.js"></script>
<script src="js/data-sunesta.js"></script>
<script src="js/data-eclipse.js"></script>
<script src="js/app.js"></script>
</body>
</html>
